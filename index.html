<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ff0000;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .glitch-title {
    font-size: clamp(28px, 6vw, 72px);
    font-weight: 900;
    color: #ff0000;
    text-transform: uppercase;
    letter-spacing: 8px;
    animation: glitch 0.3s infinite, flicker 1.5s infinite;
    text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff;
    margin-bottom: 10px;
  }
  .skull-row {
    font-size: clamp(30px, 5vw, 60px);
    animation: pulse-skull 0.6s infinite alternate;
    margin: 8px 0;
    filter: drop-shadow(0 0 8px #ff0000);
  }
  .hacked-by {
    font-size: clamp(14px, 3vw, 28px);
    color: #ff3300;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: flicker 0.8s infinite;
    margin: 6px 0;
    text-shadow: 0 0 10px #ff0000;
  }
  .team-name {
    font-size: clamp(22px, 5vw, 58px);
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 6px;
    text-transform: uppercase;
    animation: glitch2 0.4s infinite, colorshift 2s infinite;
    text-shadow: 3px 0 #ff0000, -3px 0 #00ff00;
    margin: 10px 0;
  }
  .pk-flag-text {
    font-size: clamp(18px, 4vw, 48px);
    font-weight: 900;
    color: #00cc44;
    letter-spacing: 5px;
    animation: blink-fast 0.4s infinite;
    text-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66;
    margin: 8px 0;
  }
  .separator {
    font-size: clamp(16px, 3vw, 36px);
    color: #ff0000;
    animation: spin-blink 0.5s infinite;
    margin: 6px 0;
    letter-spacing: 3px;
  }
  .israel-line {
    font-size: clamp(16px, 3vw, 36px);
    font-weight: 900;
    color: #ff2200;
    animation: shake 0.15s infinite, blink-fast 0.3s infinite;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #ff0000;
    margin: 8px 0;
  }
  .anime-container {
    margin: 15px 0;
    position: relative;
  }
  .anime-container img {
    width: clamp(120px, 25vw, 200px);
    height: clamp(120px, 25vw, 200px);
    object-fit: cover;
    border: 3px solid #ff0000;
    border-radius: 50%;
    animation: border-pulse 0.5s infinite alternate, float 3s ease-in-out infinite;
    box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, inset 0 0 20px rgba(255,0,0,0.3);
    filter: saturate(1.3) contrast(1.1);
  }
  .warning-text {
    font-size: clamp(10px, 2vw, 16px);
    color: #ff6600;
    letter-spacing: 2px;
    animation: blink-fast 0.5s infinite;
    margin: 4px 0;
  }
  .matrix-line {
    font-size: 12px;
    color: #003300;
    letter-spacing: 2px;
    animation: matrix-scroll 0.1s infinite;
    font-family: monospace;
    overflow: hidden;
    white-space: nowrap;
    margin: 2px 0;
  }
  .click-notice {
    font-size: clamp(11px, 2vw, 18px);
    color: #ffff00;
    animation: blink-fast 0.7s infinite;
    margin-top: 10px;
    letter-spacing: 3px;
  }
  @keyframes glitch {
    0%   { text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff; transform: translate(0); }
    20%  { text-shadow: -3px 0 #00ffff, 3px 0 #ff00ff; transform: translate(-2px, 1px); }
    40%  { text-shadow: 3px 0 #ff0000, -3px 0 #00ff00; transform: translate(2px, -1px); }
    60%  { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; transform: translate(1px, 2px); }
    80%  { text-shadow: 2px 0 #00ff00, -2px 0 #ff0000; transform: translate(-1px, -2px); }
    100% { text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff; transform: translate(0); }
  }
  @keyframes glitch2 {
    0%   { transform: translate(0) skew(0deg); }
    25%  { transform: translate(-3px, 0) skew(2deg); }
    50%  { transform: translate(3px, 0) skew(-2deg); }
    75%  { transform: translate(-1px, 1px) skew(1deg); }
    100% { transform: translate(0) skew(0deg); }
  }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.2; }
    97% { opacity: 1; }
    98% { opacity: 0; }
    99% { opacity: 0.8; }
  }
  @keyframes blink-fast {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes pulse-skull {
    0%   { transform: scale(1); filter: drop-shadow(0 0 5px #ff0000); }
    100% { transform: scale(1.1); filter: drop-shadow(0 0 20px #ff0000); }
  }
  @keyframes shake {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-3px, 1px); }
    50%  { transform: translate(3px, -1px); }
    75%  { transform: translate(-1px, 2px); }
    100% { transform: translate(1px, -2px); }
  }
  @keyframes border-pulse {
    0%   { box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; border-color: #ff0000; }
    100% { box-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000, 0 0 80px #ff4400; border-color: #ff4400; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-10px); }
  }
  @keyframes colorshift {
    0%   { color: #ffffff; }
    33%  { color: #ff3300; }
    66%  { color: #ffffff; }
    100% { color: #ff3300; }
  }
  @keyframes spin-blink {
    0%, 49% { opacity: 1; letter-spacing: 3px; }
    50%, 100% { opacity: 0.2; letter-spacing: 6px; }
  }
  @keyframes matrix-scroll {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }
  #click-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 999;
    cursor: crosshair;
  }
  .scan-line {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,0,0,0.15);
    animation: scan 3s linear infinite;
    pointer-events: none;
    z-index: 5;
  }
  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }
</style>
</head>
<body>

<div id="click-overlay" onclick="window.open('https://co3er.site','_blank')"></div>
<canvas id="bg-canvas"></canvas>
<div class="scan-line"></div>

<div id="content">

  <div class="skull-row">💀 ☠️ 💀 ☠️ 💀</div>

  <div class="glitch-title">SYSTEM BREACHED</div>

  <div class="hacked-by">≫ HACKED BY ≪</div>

  <div class="team-name">CO3ER DEVELOPMENT</div>

  <div class="separator">▓▒░ ⚡ ░▒▓</div>

  <div class="pk-flag-text">🇵🇰 PAKISTAN ZINDABAD 🇵🇰</div>
  <div class="pk-flag-text" style="font-size:clamp(14px,2.5vw,30px); color:#00ff66; animation-delay:0.2s;">★ PAKISTAN ON TOP ★</div>

  <div class="separator" style="color:#ff0000;">═══════════════</div>

  <div class="anime-container">
    <img src="75d3bc307a942dc2e915b8690a2fde6e-removebg-preview.png" alt="CO3ER Agent" />
  </div>

  <div class="israel-line">🔥 ISRAIL LUN PE 🔥</div>

  <div class="separator">▓▒░ ⚡ ░▒▓</div>

  <div class="warning-text">⚠ YOUR DATA HAS BEEN COMPROMISED ⚠</div>
  <div class="warning-text" style="color:#ff0000; animation-delay:0.25s;">⚠ SECURITY SYSTEM DESTROYED ⚠</div>

  <div class="skull-row" style="font-size: clamp(20px, 3vw, 40px); margin-top:8px;">☠ ☠ ☠ ☠ ☠</div>

  <div class="click-notice">[ CLICK ANYWHERE TO CONTINUE ]</div>

</div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const cols = Math.floor(window.innerWidth / 16);
const drops = Array(cols).fill(1);
const chars = "01アイウエオカキクケコサシスセソCO3ERPAKISTANHACKED死破壊01010111";

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#003300';
  ctx.font = '13px monospace';
  for (let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = Math.random() > 0.95 ? '#ff0000' : '#004400';
    ctx.fillText(char, i * 16, drops[i] * 16);
    if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

document.getElementById('click-overlay').addEventListener('click', function() {
  window.open('https://co3er.site', '_blank');
});
</script>
</body>
</html>
